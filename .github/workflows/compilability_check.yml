name: Compilability check
on: [ push, pull_request ]
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [ "armeabi-v7a", "arm64-v8a", "x86", "x86_64" ]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup the environment
        run: |
          sudo pip3 install meson==1.4.0
          sudo apt-get install nasm ninja-build gtk-doc-tools

      - name: Set up dependencies
        run: sudo apt-get install -y build-essential autoconf
        
      - name: Executing the script
        run: |
          export ANDROID_SDK_HOME=$ANDROID_HOME
          export ANDROID_NDK_HOME=$ANDROID_NDK
          ./ffmpeg-android-maker.sh -all-free -x264 -all-bsd -fdk-aac -android=30 -abis=${{ matrix.abi }}

      - name: upload ffmpeg
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg
          path: build/ffmpeg/${{ matrix.abi }}/bin/*
